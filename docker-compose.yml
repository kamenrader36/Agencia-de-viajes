version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travel_agency_db
    ports:
      - "3307:3306"


  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command: start-dev --hostname-strict=false
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=localhost
    ports:
      - "8081:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data


  backend:
    image: eltorsileno/travel-backend:latest
    container_name: travel-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/travel_agency_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    restart: on-failure  
    depends_on:
      - mysql-db
      - keycloak

  frontend:
    image: eltorsileno/travel-frontend:latest
    container_name: travel-frontend
    ports:
      - "8008:80"
    depends_on:
      - backend

volumes:
  keycloak_data:
